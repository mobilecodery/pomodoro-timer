<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⏳ Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="liquid-cursor"></div>
    <div class="container">
    <div class="settings">
    <select id="timer-choice">
        <option value="25">Focus (25m)</option>
        <option value="50">Deep Work (50m)</option>
        <option value="5">Short Break (5m)</option>
        <option value="15">Long Break (15m)</option>
    </select>
    </div>


    <div class="timer">
    <h2 id="display-text"></h2>

    <div class="timer-container">
        <!-- The SVG Ring -->
        <svg class="progress-ring" width="240" height="240">
            <!-- Background circle (the "track") -->
            <circle class="progress-ring__track" stroke="rgba(255, 255, 255, 0.1)" stroke-width="8" fill="transparent" r="100" cx="120" cy="120"/>
            <!-- Foreground circle (the "progress") -->
            <circle class="progress-ring__circle" stroke="#ff8c6b" stroke-width="8" fill="transparent" r="100" cx="120" cy="120"/>
        </svg>
        
        <div class="time-display">25:00</div>
    </div>

    <div class="controls">
        <button id="start-btn" class="play-btn">▶</button>
        <button id="reset-btn" class="reset-btn">↺</button>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
